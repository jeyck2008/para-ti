<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una sorpresa para ti 🌷</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020b1f;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:80px 80px,120px 120px;
background-position:0 0,40px 40px;
animation:twinkle 6s linear infinite;
}

@keyframes twinkle{
50%{opacity:.6;}
100%{opacity:1;}
}

.screen{
position:absolute;
text-align:center;
width:100%;
padding:20px;
}

.hidden{
display:none;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
background:#5cc9ff;
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#countdown{
font-size:80px;
font-weight:bold;
animation:fade 1s infinite;
}

@keyframes fade{
50%{opacity:.4;}
}

#garden{
position:absolute;
bottom:0;
width:100%;
height:100%;
display:none;
}

#stem{
position:absolute;
bottom:120px;
left:50%;
width:8px;
height:0;
background:#1fb54a;
transform:translateX(-50%);
}

#flower{
position:absolute;
left:50%;
bottom:310px;
transform:translateX(-50%) scale(0);
font-size:110px;
}

.heart{
position:absolute;
bottom:-30px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

#message{
position:absolute;
width:100%;
bottom:40px;
text-align:center;
font-size:30px;
line-height:1.5;
opacity:0;
padding:20px;
}

.cursor{
border-right:3px solid white;
animation:blink .8s infinite;
}

@keyframes blink{
50%{
border-color:transparent;
}
}
</style>
</head>

<body>

<div id="stars"></div>

<div id="intro" class="screen">
<h2>✨ Hay personas que llegan sin avisar y cambian nuestros días... ✨</h2>
<br><br>
<button onclick="startMovie()">
💙 Presiona si me das una oportunidad 💙
</button>
</div>

<div id="count" class="screen hidden">
<div id="countdown">3</div>
</div>

<div id="garden">
<div id="stem"></div>
<div id="flower">🌷🩵</div>

<div id="message">
<span id="text"></span><span class="cursor"></span>
</div>
</div>

<script>

function startMovie(){

document.getElementById("intro").classList.add("hidden");
document.getElementById("count").classList.remove("hidden");

let n=3;

let timer=setInterval(()=>{

document.getElementById("countdown").innerHTML=n;

n--;

if(n<0){

clearInterval(timer);

document.getElementById("count").classList.add("hidden");

showMagic();

}

},1000);

}

function showMagic(){

document.getElementById("garden").style.display="block";

let stem=document.getElementById("stem");

let h=0;

let grow=setInterval(()=>{

h+=4;

stem.style.height=h+"px";

if(h>=200){

clearInterval(grow);

document.getElementById("flower").style.transition="2s";

document.getElementById("flower").style.transform="translateX(-50%) scale(1)";

createHearts();

setTimeout(typeMessage,1500);

}

},40);

}

function createHearts(){

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"❤️":"🩵";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*25)+"px";
heart.style.animationDuration=(4+Math.random()*5)+"s";
heart.style.animationDelay=(Math.random()*4)+"s";

document.body.appendChild(heart);

}

}

function typeMessage(){

document.getElementById("message").style.opacity=1;

const msg=`Con mucho amor...

Parti, te quiero ❤️

No sé qué nos depare el destino,
pero conocerte ha sido una de las cosas
más bonitas de mi vida.

🌷 Gracias por existir. 🌷`;

let i=0;

function write(){

if(i<msg.length){

document.getElementById("text").innerHTML+=msg.charAt(i);

i++;

setTimeout(write,45);

}

}

write();

}

</script>

</body>
</html>
